<div class="container">
  <h1>Machines</h1>

  <button mat-raised-button color="primary" (click)="openDialog()">
    Create Machine
  </button>

  <table mat-table [dataSource]="machines" class="mat-elevation-z8 mt-4 w-full">
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef> Name </th>
      <td mat-cell *matCellDef="let m"> {{ m.name }} </td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef> Status </th>
      <td mat-cell *matCellDef="let m"> {{ m.status }} </td>
    </ng-container>

    <!-- NEW: Temperature Column -->
    <ng-container matColumnDef="temperature">
      <th mat-header-cell *matHeaderCellDef> Temp (°C) </th>
      <td mat-cell *matCellDef="let element"> {{element.temperature | number:'1.1-2'}} </td>
    </ng-container>

    <!-- NEW: Vibration Column -->
    <ng-container matColumnDef="vibration">
      <th mat-header-cell *matHeaderCellDef> Vibration </th>
      <td mat-cell *matCellDef="let element"> {{element.vibration | number:'1.1-2'}} </td>
    </ng-container>

    <!-- NEW: Load Column -->
    <ng-container matColumnDef="current">
      <th mat-header-cell *matHeaderCellDef> Load (%) </th>
      <td mat-cell *matCellDef="let element"> {{element.currentPercentOfRated}}% </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</div>
